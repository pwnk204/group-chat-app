<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> signup </title>
    <link rel="stylesheet" href="./css/signup.css">

</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create your account</h2>
            <p>Enter your information below to create your account</p>
            <form action="" id="signup-form">
                <div class="form-field">
                    <label for="userName">User Name</label>
                    <input type="text" id="userName" name="userName" placeholder="John Doe" required>
                </div>
                <div class="form-field">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="Enter your email address here"
                        required>
                </div>

                <div class="form-field">
                    <label for="userPhone">Phone Number</label>
                    <input type="tel" id="userPhone" name="userPhone" placeholder="1234567890" pattern="[0-9]{10}"
                        required>
                </div>
               
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password"
                        required>
                </div>

                <div class="form-field">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="password" placeholder="Confirm password"
                        required>
                </div>
                <button type="submit" class="btn-primary signup-btn">Sign Up</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>

        </div>

    </div>


</body>

</html>
